env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = cursor:no_hardware_cursors,true

env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Autostart
exec-once = waybar
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Keybinds
$mainMod = SUPER

bind = $mainMod, W, exec, waybar
bind = $mainMod, Q, exec, kitty
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, D, exec, dolphin
bind = $mainMod, N, exec, networkmanager_dmenu
bind = $mainMod, C, killactive,
bind = $mainMod, F, togglefloating,
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, J, togglesplit,
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Full monitor screenshot
bind = , Print, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && wl-copy < ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png

# Region screenshot
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && wl-copy < ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png

# Window customizations

general {
	gaps_in = 5
	gaps_out = 7
	border_size = 2
	col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
	col.inactive_border = rgba(595959aa)
}

decoration {
	rounding = 12

	active_opacity = 0.8
	inactive_opacity = 0.6

	blur {
		enabled = true
		size = 7
		passes = 2
		new_optimizations = true
	}

	shadow {
		enabled = true
		range = 4
		render_power = 3
		color = rgba(1a1a1aee)
	}
}

animations {
    enabled = true
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Window rules
windowrulev3 = float, class:^(pavucontrol)$

windowrulev3 = opacity 0.85 override 0.75 override, class:^(kitty)$
windowrulev3 = blur, class:^(kitty)$

# Rofi
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi


